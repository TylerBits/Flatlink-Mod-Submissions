name: Build submissions index

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate submissions-index.json
        run: |
          echo '[' > submissions-index.json
          first=true
          for dir in Core/*/; do
            slug=$(basename "$dir")
            if [ -f "${dir}game.json" ]; then
              if [ "$first" = true ]; then
                first=false
              else
                echo ',' >> submissions-index.json
              fi
              echo "  {\"id\":\"$slug\",$(cat "${dir}game.json" | tr -d '\n' | sed 's/^[ \t]*{//')" >> submissions-index.json
            fi
          done
          echo ']' >> submissions-index.json

      - name: Commit updated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add submissions-index.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update submissions-index.json"
          git push
